name: Bug report
description: Report API/runtime behavior that is not working as expected
labels:
  - bug
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: RAG query returns 500 when pgvector extension is missing
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure env ...
        2. Call endpoint ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: endpoint
    attributes:
      label: Affected endpoint or package
      placeholder: POST /api/rag/query or internal/services/rag_service.go
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and evidence
      description: Include request payload, response, stack trace, and environment details if possible
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I checked for duplicate issues.
          required: true
        - label: I included enough detail for maintainers to reproduce.
          required: true
