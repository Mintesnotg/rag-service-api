basePath: /
definitions:
  handlers.CreateDocCategoryRequest:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  handlers.CreatePermissionRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  handlers.CreateRoleRequest:
    properties:
      name:
        type: string
      permission_ids:
        items:
          type: string
        type: array
    required:
    - name
    type: object
  handlers.DocCategoryResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  handlers.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handlers.PermissionRequest:
    properties:
      role_ids:
        items:
          type: string
        type: array
    required:
    - role_ids
    type: object
  handlers.RAGQueryRequest:
    properties:
      category:
        type: string
      question:
        type: string
      top_k:
        type: integer
    required:
    - question
    type: object
  handlers.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  handlers.UpdateDocCategoryRequest:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  handlers.UpdatePermissionRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  handlers.UpdateRoleRequest:
    properties:
      name:
        type: string
      permission_ids:
        items:
          type: string
        type: array
    required:
    - name
    type: object
  services.DocumentDTO:
    properties:
      category_id:
        type: string
      category_name:
        type: string
      created_at:
        type: string
      doc_description:
        type: string
      doc_name:
        type: string
      file_name:
        type: string
      file_size:
        type: integer
      file_type:
        type: string
      file_url:
        type: string
      id:
        type: string
      processing_status:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  services.PermissionDTO:
    properties:
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
    type: object
  services.QueryResponse:
    properties:
      answer:
        type: string
      contexts:
        items:
          type: string
        type: array
      sources:
        items:
          type: string
        type: array
    type: object
  services.RoleDTO:
    properties:
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      permission_count:
        type: integer
      permissions:
        items:
          $ref: '#/definitions/services.PermissionDTO'
        type: array
    type: object
info:
  contact: {}
  description: API documentation for Smart Doc service.
  title: Smart Doc API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: login
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login and obtain JWT
      tags:
      - Auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: register
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/handlers.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - Auth
  /api/doc-categories:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.DocCategoryResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get all document categories
      tags:
      - Document Categories
    post:
      consumes:
      - application/json
      parameters:
      - description: document category
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateDocCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.DocCategoryResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a document category
      tags:
      - Document Categories
  /api/doc-categories/{id}:
    delete:
      parameters:
      - description: category id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: no content
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Soft delete a document category (set status inactive)
      tags:
      - Document Categories
    get:
      parameters:
      - description: category id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.DocCategoryResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get a document category by ID
      tags:
      - Document Categories
    put:
      consumes:
      - application/json
      parameters:
      - description: category id
        in: path
        name: id
        required: true
        type: string
      - description: document category
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateDocCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.DocCategoryResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a document category
      tags:
      - Document Categories
  /api/documents:
    get:
      parameters:
      - description: Category name
        in: query
        name: category
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List documents by category
      tags:
      - Documents
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Document title
        in: formData
        name: doc_name
        required: true
        type: string
      - description: Document description
        in: formData
        name: doc_description
        type: string
      - description: Category name (auto from page context)
        in: formData
        name: category
        required: true
        type: string
      - description: Document file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/services.DocumentDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create document
      tags:
      - Documents
  /api/documents/{id}:
    delete:
      parameters:
      - description: document id
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: deleted
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Soft delete document (set status inactive)
      tags:
      - Documents
    put:
      consumes:
      - multipart/form-data
      parameters:
      - description: document id
        in: path
        name: id
        required: true
        type: string
      - description: Document title
        in: formData
        name: doc_name
        required: true
        type: string
      - description: Document description
        in: formData
        name: doc_description
        type: string
      - description: Category name (auto from page context)
        in: formData
        name: category
        required: true
        type: string
      - description: Replacement file
        in: formData
        name: file
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.DocumentDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update document
      tags:
      - Documents
  /api/documents/{id}/download:
    get:
      parameters:
      - description: document id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get temporary download URL for a document
      tags:
      - Documents
  /api/permissions:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      - description: Search by name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List permissions
      tags:
      - Permissions
    post:
      consumes:
      - application/json
      parameters:
      - description: create permission
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/handlers.CreatePermissionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/services.PermissionDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a permission
      tags:
      - Permissions
  /api/permissions/{id}:
    delete:
      parameters:
      - description: permission id
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: deleted
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Soft delete a permission
      tags:
      - Permissions
    put:
      consumes:
      - application/json
      parameters:
      - description: permission id
        in: path
        name: id
        required: true
        type: string
      - description: update permission
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdatePermissionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.PermissionDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a permission
      tags:
      - Permissions
  /api/permissions/resolve:
    post:
      consumes:
      - application/json
      parameters:
      - description: role ids
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/handlers.PermissionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get permissions for the given role IDs
      tags:
      - Permissions
  /api/rag/query:
    post:
      consumes:
      - application/json
      description: Returns an answer and supporting contexts from indexed documents.
      parameters:
      - default: document.manage
        description: Permission claim
        in: header
        name: X-Permission
        required: true
        type: string
      - description: RAG query payload
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/handlers.RAGQueryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.QueryResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Query indexed documents with RAG
      tags:
      - RAG
  /api/roles:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      - description: Search by name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List roles
      tags:
      - Roles
    post:
      consumes:
      - application/json
      parameters:
      - description: create role
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateRoleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/services.RoleDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a role
      tags:
      - Roles
  /api/roles/{id}:
    delete:
      parameters:
      - description: role id
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: deleted
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Soft delete a role
      tags:
      - Roles
    put:
      consumes:
      - application/json
      parameters:
      - description: role id
        in: path
        name: id
        required: true
        type: string
      - description: update role
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.RoleDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a role
      tags:
      - Roles
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
